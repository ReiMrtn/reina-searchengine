<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Search Engine Reina Palus</title>

<style>

/* Body */
body{
    font-family: Arial, sans-serif;
    margin:0;
    text-align:center;
    background: linear-gradient(135deg,#f09c82d3,#6c4198);
    min-height:100vh;
}

/* Header */
.header{
    display:flex;
    justify-content:flex-end;
    padding:15px 30px;
    font-size:14px;
}

.header a{
    margin-left:20px;
    text-decoration:none;
    color:rgb(252, 250, 250);
}

.header a:hover{
    text-decoration:underline;
}

/* Profil */
.profil{
    width:30px;
    height:30px;
    background:#b7efb5aa;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    margin-left:20px;
}

/* Container */
.container{
    margin-top:60px;
}

/* Kotak utama */
.box{
    background:rgb(255, 255, 255);
    width:90%;
    max-width:650px;
    margin:auto;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(243, 162, 218, 0.731);
}

/* Judul */
h1{
    font-size:50px;
    color:#f479c5e1;
}

/* Search Box */
.search-box{
    display:flex;
    justify-content:center;
    margin-top:25px;
}

/* Input pencarian */
.search-box input{
    width:350px;
    padding:12px;
    font-size:16px;
    border-radius:25px 0 0 25px;
    border:1px solid #9534ad48;
    outline:none;
}

/* Tombol cari menyatu */
.btn-cari{
    padding:12px 20px;
    border:none;
    background:#b656dfa4;
    color:white;
    font-size:16px;
    border-radius:0 25px 25px 0;
    cursor:pointer;
    font-weight:bold;
}

/* Hover tombol */
.btn-cari:hover{
    background:#9534ad;
}

/* Kata kunci Paling Sering */
.popular{
    margin-top:25px;
}

.tag{
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    background:#f1f1f1;
    border-radius:15px;
    font-size:13px;
    cursor:pointer;
}

.tag:hover{
    background:#9534ad;
    color:rgb(255, 255, 255);
}

/* Footer */
footer{
    margin-top:60px;
    color:white;
    font-size:14px;
}

/* Responsive untuk HP */
@media (max-width:600px){

h1{
    font-size:36px;
}

.search-box input{
    width:200px;
}

.container{
    margin-top:40px;
}

}

</style>
</head>

<body>

<!-- Header -->
<div class="header">
<a href="#">Gmail</a>
<a href="#">Gambar</a>
<div class="profil">MtN</div>
</div>

<!-- Konten Tengah -->
<div class="container">

<div class="box">

<h1>Se🔍rch.R</h1>

<p>Mencari Informasi Lebih Mudah</p>

<form>

<div class="search-box">
<input type="text" name="q" placeholder="Telusuri...">
<button class="btn-cari" type="submit">Cari🔍</button>
</div>

</form>

</div>

</div>

<footer>
</footer>

<div id="hasil"></div>

<script>
document.querySelector('form').onsubmit = async (e) => {
    e.preventDefault();
    const keyword = document.querySelector('input').value;
    
    // TAMPILKAN PESAN LOADING
    document.getElementById('hasil').innerHTML = '<p style="color:white;">Mencari...</p>';
    
    try {
        // PINDAH KE SINI - URL LENGKAP DENGAN http://
        const response = await fetch(`https://reina-palus-searchengine-woe2.vercel.app/search?q=${encodeURIComponent(keyword)}&method=bfs`);
        const data = await response.json();
        
        let html = `<div style="color:white; font-size:18px; margin-bottom:15px;">
            ≈ ${data.total_results} hasil (${(data.metadata?.execution_time * 1000 || 0).toFixed(2)} detik)
        </div>`;
        
        if (data.results && data.results.length > 0) {
            data.results.forEach(item => {
                // Buat ID untuk link (misalnya: sydney, bondi_beach, dll)
                const locationId = item.id || item.name.toLowerCase().replace(/ /g, '_');
                
                html += `
                    <div style="background:white; border-radius:10px; padding:15px; margin-bottom:15px; text-align:left; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                        <h3 style="margin:0 0 5px 0;">
                            <a href="#" onclick="showDetail('${locationId}'); return false;" style="color:#1a0dab; text-decoration:none; font-size:20px;">
                                ${item.name}
                            </a>
                        </h3>
                        <div style="color:#006621; font-size:14px; margin-bottom:5px;">
                            ${window.location.href}detail/${locationId}
                        </div>
                        <p style="color:#545454; margin:5px 0; font-size:14px;">
                            ${item.description || 'Tidak ada deskripsi'}
                        </p>
                        <div style="color:#808080; font-size:12px; margin-top:5px;">
                            Kategori: ${item.category} ${item.depth !== undefined ? '| Depth: ' + item.depth : ''}
                        </div>
                    </div>
                `;
            });
        } else {
            html += `
                <div style="background:white; border-radius:10px; padding:20px; text-align:center;">
                    <p style="color:#545454;">Tidak ada hasil ditemukan untuk "${data.keyword}"</p>
                    <p style="color:#808080; font-size:14px;">Coba kata kunci lain seperti: sydney, beach, opera, bridge</p>
                </div>
            `;
        }
        
        // Tambah footer
        html += `<div style="color:white; font-size:12px; text-align:center; margin-top:20px;">
            Metode: ${data.metadata?.method || 'Unknown'} | ${data.metadata?.visited_nodes ? 'Node: ' + data.metadata.visited_nodes : ''}
        </div>`;
        
        document.getElementById('hasil').innerHTML = html;
    } catch (error) {
        document.getElementById('hasil').innerHTML = `
            <div style="background:#ffebee; border-radius:10px; padding:20px; color:#c62828;">
                <p><b>Error:</b> Pastikan server sudah dijalankan (python app.py) di terminal</p>
                <p style="font-size:12px;">${error.message}</p>
            </div>
        `;
    }
};

// Fungsi untuk melihat detail tempat
window.showDetail = function(locationId) {
    const hasilDiv = document.getElementById('hasil');
    
    // Tampilkan loading
    hasilDiv.innerHTML = '<p style="color:white;">Memuat detail...</p>';
    
    // Data lengkap dari backend.py (15 tempat di Sydney)
    const allLocationsData = {
        "sydney": {
            "name": "Sydney - Harbour City",
            "category": "city",
            "description": "Kota terbesar di Australia dan ibu kota negara bagian New South Wales. Dikenal dengan Sydney Opera House, Harbour Bridge, dan pantai Bondi.",
            "area": "12,368 km²",
            "population": "5,312,000 jiwa (2024)",
            "nicknames": "Harbour City, Emerald City",
            "industries": "Keuangan, Pariwisata, Teknologi",
            "landmarks": "Sydney Opera House, Harbour Bridge",
            "climate": "Subtropis lembap",
            "timezone": "AEST / AEDT",
            "universities": "University of Sydney, UNSW",
            "coordinates": "33.8688° S, 151.2093° E",
            "food": "Seafood, Meat Pie",
            "transportation": "Metro, Ferry, Bus"
        },
        "parramatta": {
            "name": "Parramatta",
            "category": "city",
            "description": "Kota satelit di barat Sydney dan pusat bisnis kedua di NSW.",
            "population": "256,729 jiwa",
            "area": "84 km²",
            "industries": "Bisnis, Administrasi"
        },
        "manly": {
            "name": "Manly",
            "category": "tourist_area",
            "description": "Area wisata terkenal dengan pantai dan jalur ferry dari Sydney.",
            "food": "Seafood, Fish & Chips"
        },
        "bondi_beach": {
            "name": "Bondi Beach",
            "category": "beach",
            "description": "Pantai paling terkenal di Sydney dan tujuan wisata utama.",
            "length": "1 km"
        },
        "sydney_airport": {
            "name": "Sydney Kingsford Smith Airport",
            "category": "airport",
            "description": "Bandara internasional utama Sydney.",
            "code": "SYD",
            "passengers": "44+ juta/tahun"
        },
        "opera_house": {
            "name": "Sydney Opera House",
            "category": "landmark",
            "description": "Gedung pertunjukan ikonik berbentuk layar kapal.",
            "height": "65 meter"
        },
        "harbour_bridge": {
            "name": "Sydney Harbour Bridge",
            "category": "landmark",
            "description": "Jembatan baja besar yang menghubungkan pusat Sydney dan North Shore.",
            "length": "1,149 meter"
        },
        "darling_harbour": {
            "name": "Darling Harbour",
            "category": "tourist_area",
            "description": "Kawasan wisata dengan museum, restoran, dan akuarium."
        },
        "circular_quay": {
            "name": "Circular Quay",
            "category": "harbour",
            "description": "Pelabuhan utama dengan ferry menuju berbagai area Sydney."
        },
        "the_rocks": {
            "name": "The Rocks",
            "category": "historic_area",
            "description": "Kawasan bersejarah dekat Harbour Bridge dengan pasar dan museum."
        },
        "newtown": {
            "name": "Newtown",
            "category": "neighborhood",
            "description": "Area budaya dengan seni jalanan dan restoran unik."
        },
        "chinatown": {
            "name": "Sydney Chinatown",
            "category": "district",
            "description": "Kawasan budaya dengan restoran Asia dan pasar malam."
        },
        "university_sydney": {
            "name": "University of Sydney",
            "category": "university",
            "description": "Universitas tertua di Australia, didirikan tahun 1850."
        },
        "taronga_zoo": {
            "name": "Taronga Zoo",
            "category": "zoo",
            "description": "Kebun binatang terkenal dengan pemandangan Sydney Harbour."
        },
        "blue_mountains": {
            "name": "Blue Mountains",
            "category": "national_park",
            "description": "Taman nasional terkenal dekat Sydney dengan Three Sisters rock formation."
        }
    };
    
    // Ambil data lokasi berdasarkan ID
    const item = allLocationsData[locationId];
    
    if (item) {
        let html = `
            <div style="background:white; border-radius:10px; padding:20px; text-align:left; position:relative;">
                <button onclick="kembaliKeHasil()" style="background:#f0f0f0; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-bottom:15px; font-size:14px;">
                    ← Kembali ke hasil pencarian
                </button>
                
                <h2 style="color:#1a0dab; margin:10px 0; font-size:28px;">${item.name}</h2>
                
                <div style="background:#f8f9fa; padding:15px; border-radius:8px; margin:15px 0;">
                    <p><strong>Kategori:</strong> ${item.category}</p>
                    <p><strong>ID Lokasi:</strong> ${locationId}</p>
                </div>
                
                <div style="margin:20px 0;">
                    <h3 style="color:#333;">Deskripsi:</h3>
                    <p style="color:#545454; line-height:1.6; font-size:16px;">${item.description || 'Tidak ada deskripsi'}</p>
                </div>
        `;
        
        // Tambahkan informasi tambahan (kecuali name, category, description, neighbors)
        const extraInfo = { ...item };
        delete extraInfo.name;
        delete extraInfo.category;
        delete extraInfo.description;
        delete extraInfo.neighbors;
        
        if (Object.keys(extraInfo).length > 0) {
            html += `<hr style="border:1px solid #eee;"><div style="margin-top:15px;"><h4 style="color:#333;">Informasi Detail:</h4><table style="width:100%;">`;
            
            for (let [key, value] of Object.entries(extraInfo)) {
                const label = key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, ' ');
                html += `<tr><td style="padding:8px; font-weight:bold; width:35%; background:#f5f5f5;">${label}:</td><td style="padding:8px;">${value}</td></tr>`;
            }
            
            html += `</table></div>`;
        }
        
        // Tambahkan neighbors jika ada
        if (item.neighbors && item.neighbors.length > 0) {
            html += `<hr style="border:1px solid #eee;"><div style="margin-top:15px;"><h4 style="color:#333;">Tempat Terdekat:</h4><p>`;
            item.neighbors.forEach(neighbor => {
                const neighborName = allLocationsData[neighbor]?.name || neighbor;
                html += `<span onclick="showDetail('${neighbor}')" style="display:inline-block; background:#e0e0e0; padding:5px 10px; border-radius:15px; margin:0 5px 5px 0; cursor:pointer; font-size:13px;">${neighborName}</span>`;
            });
            html += `</p></div>`;
        }
        
        html += `
                <hr style="border:1px solid #eee;">
                
                <div style="margin-top:20px;">
                    <h4 style="color:#333;">Cari Lainnya:</h4>
                    <button onclick="cariLagi('beach')" style="background:#b656df; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-right:10px; margin-bottom:5px;">
                        Pantai
                    </button>
                    <button onclick="cariLagi('opera')" style="background:#6c4198; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-right:10px; margin-bottom:5px;">
                        Opera
                    </button>
                    <button onclick="cariLagi('bridge')" style="background:#6c4198; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-right:10px; margin-bottom:5px;">
                        Bridge
                    </button>
                    <button onclick="cariLagi('university')" style="background:#6c4198; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-right:10px; margin-bottom:5px;">
                        University
                    </button>
                </div>
            </div>
        `;
        
        // Simpan hasil pencarian sebelumnya
        sessionStorage.setItem('previousResults', document.getElementById('hasil').innerHTML);
        
        document.getElementById('hasil').innerHTML = html;
    } else {
        document.getElementById('hasil').innerHTML = `
            <div style="background:#ffebee; border-radius:10px; padding:20px; color:#c62828;">
                <p><b>Error:</b> Lokasi tidak ditemukan</p>
                <button onclick="kembaliKeHasil()" style="background:#b656df; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:10px;">
                    ← Kembali
                </button>
            </div>
        `;
    }
};
// Fungsi untuk kembali ke hasil pencarian
window.kembaliKeHasil = function() {
    const previousResults = sessionStorage.getItem('previousResults');
    if (previousResults) {
        document.getElementById('hasil').innerHTML = previousResults;
    } else {
        document.getElementById('hasil').innerHTML = '';
    }
};

// Fungsi untuk mencari dengan kata kunci tertentu
window.cariLagi = function(keyword) {
    document.querySelector('input').value = keyword;
    document.querySelector('form').onsubmit(new Event('submit'));
};
</script>

</body>
</html>
